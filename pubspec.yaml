name: ethio_omni_app
description: Ethiopia's Digital Freight & Logistics Exchange
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.8.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # HTTP Client
  dio: ^5.4.0
  retrofit: ^4.0.3

  # Local Storage (Offline-first)
  drift: ^2.14.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.18
  path: ^1.9.0

  # Real-time (WebSocket)
  socket_io_client: ^3.1.4

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Authentication
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1

  # Payment Integration
  url_launcher: ^6.2.2

  # Notifications (TODO: Add Firebase configuration)
  # firebase_messaging: ^14.7.10
  flutter_local_notifications: ^21.0.0

  # Multi-language Support
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Images
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  uuid: ^4.2.2
  logger: ^2.0.2
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.1
  permission_handler: ^12.0.1

  # DateTime
  table_calendar: ^3.0.9

  # Charts
  fl_chart: ^1.2.0

  # Fonts
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  retrofit_generator: ^10.2.1
  riverpod_generator: ^4.0.3
  drift_dev: ^2.14.0
  go_router_builder: ^4.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/

